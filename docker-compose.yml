version: '3.8'

services:
  gorvaxbot:
    build: .
    container_name: gorvaxbot
    restart: unless-stopped
    env_file: .env
    environment:
      - NODE_ENV=production
      - REDIS_URL=redis://redis:6379
    volumes:
      - ./data:/app/data  # Persistir banco SQLite
    depends_on:
      - redis
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  redis:
    image: redis:alpine
    container_name: gorvax-redis
    restart: unless-stopped
    volumes:
      - redis_data:/data

volumes:
  redis_data:
